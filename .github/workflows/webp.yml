name: Convert images to WebP
on:
  push:
    branches: [ main ]
    paths:
      - 'assets/gallery/**/*.{jpg,jpeg,png,JPG,JPEG,PNG}'
jobs:
  webp:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    concurrency: { group: webp-auto, cancel-in-progress: false }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install webp tools
        run: |
          sudo apt-get update
          sudo apt-get install -y webp
      - name: Convert new/changed images to WebP
        env:
          QUALITY: '82'
          MAX_WIDTH: '1200'
        run: |
          set -e
          FILES="$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- \
            'assets/gallery/**/*.[Jj][Pp][Gg]' \
            'assets/gallery/**/*.[Jj][Pp][Ee][Gg]' \
            'assets/gallery/**/*.[Pp][Nn][Gg]' || true)"
          if [ -z "$FILES" ]; then
            FILES="$(git ls-files \
              'assets/gallery/**/*.[Jj][Pp][Gg]' \
              'assets/gallery/**/*.[Jj][Pp][Ee][Gg]' \
              'assets/gallery/**/*.[Pp][Nn][Gg]' || true)"
          fi
          echo "$FILES" | while IFS= read -r f; do
            [ -z "$f" ] && continue
            out="${f%.*}.webp"
            if [ -f "$out" ]; then echo "Skip (exists): $out"; continue; fi
            case "$f" in
              *.png|*.PNG) cwebp -lossless "$f" -o "$out" ;;
              *)           cwebp -q "$QUALITY" -m 6 -resize "$MAX_WIDTH" 0 "$f" -o "$out" ;;
            esac
            echo "Converted: $f -> $out"
          done
      - name: Commit WebP files back
        uses: EndBug/add-and-commit@v9
        with:
          add: 'assets/gallery/**/*.webp'
          message: 'chore(webp): auto-convert gallery images [skip ci]'
          default_author: github_actions
